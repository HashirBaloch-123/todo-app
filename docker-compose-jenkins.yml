version: '3.8'

services:
  web:
    image: node:18-alpine
    container_name: todo-web-jenkins
    working_dir: /app
    volumes:
      - /var/lib/docker/volumes/jenkins-data/_data/workspace/todo-pipeline:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3000"
    environment:
      - MONGO_URL=mongodb://mongo-jenkins:27017/tododb
    depends_on:
      - mongo-jenkins
    restart: unless-stopped

  mongo-jenkins:
    image: mongo:6
    container_name: todo-mongo-jenkins
    volumes:
      - mongo-data-jenkins:/data/db
    ports:
      - "27018:27017"
    restart: unless-stopped

volumes:
  mongo-data-jenkins:
